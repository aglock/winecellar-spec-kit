spring:
  application:
    name: winecellar-importer
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/winecellar}

server:
  port: ${SERVER_PORT:8080}

owner:
  id: ${OWNER_ID:owner-default}
  display-name: ${OWNER_DISPLAY_NAME:Cellar Owner}

api:
  cors:
    allowed-origins: ${API_CORS_ALLOWED_ORIGINS:http://localhost:5173}
