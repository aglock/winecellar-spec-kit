openapi: 3.0.3
info:
  title: Winecellar CSV Import API
  version: 1.0.0
  description: |
    Minimal API for uploading wine-bottle CSV files and listing cellar bottles.
servers:
  - url: http://localhost:8080
paths:
  /api/imports/wine-bottles:
    post:
      summary: Upload and import wine bottles from CSV
      operationId: importWineBottlesCsv
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file matching the expected column set.
      responses:
        '200':
          description: Import completed (with possible row-level skips)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSummaryResponse'
        '400':
          description: Invalid file type, malformed header, or unusable payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cellars/default/bottles:
    get:
      summary: List bottles in the default cellar
      operationId: listDefaultCellarBottles
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Bottle list page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BottleListResponse'
components:
  schemas:
    ImportSummaryResponse:
      type: object
      required:
        - importedCount
        - skippedCount
        - skippedRows
        - eventId
      properties:
        importedCount:
          type: integer
          minimum: 0
        skippedCount:
          type: integer
          minimum: 0
        skippedRows:
          type: array
          items:
            $ref: '#/components/schemas/SkippedRow'
        eventId:
          type: string
    SkippedRow:
      type: object
      required:
        - rowNumber
        - reason
      properties:
        rowNumber:
          type: integer
          minimum: 1
        reason:
          type: string
    BottleListResponse:
      type: object
      required:
        - page
        - size
        - total
        - items
      properties:
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: '#/components/schemas/BottleListItem'
    BottleListItem:
      type: object
      required:
        - bottleId
        - wineName
        - producerName
        - vintageDisplay
        - wineType
        - bottleSize
        - country
        - region
        - quantity
      properties:
        bottleId:
          type: string
        wineName:
          type: string
        producerName:
          type: string
        vintageDisplay:
          type: string
          description: Year string or NV when vintage sentinel equals 1001.
        wineType:
          type: string
        bottleSize:
          type: string
        country:
          type: string
        region:
          type: string
        quantity:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
