services:
  mongodb:
    image: mongo:8
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/winecellar
      WC_FRONTEND_BASE_URL: http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo-data:
